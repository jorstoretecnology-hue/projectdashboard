# Docker Compose para n8n local
# Guarda este archivo como docker-compose.yml en una carpeta vacía.

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Bogota # Ajusta a tu zona horaria
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
    external: false
